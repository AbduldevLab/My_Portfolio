<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="Abderahman Haouit — Full-Stack Engineer & AI Researcher" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <title>Abder.</title>
    <script>
      // If 404.html stored a redirect path, restore it so the router can handle it
      (function () {
        var redirect = sessionStorage.getItem("spa_redirect");
        if (redirect) {
          sessionStorage.removeItem("spa_redirect");
          // Push the stored path into history so BrowserRouter picks it up
          window.history.replaceState(null, "", "/My_Portfolio" + redirect);
        }
      })();
    </script>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
